# Configuration Checkov
# Les paramètres directory, output, soft-fail sont gérés par le GitHub Action.
# Ce fichier ne contient que les skip-check (justifiés ci-dessous).

skip-check:
  # API Gateway execution logs nécessite un IAM role compte (aws_api_gateway_account)
  # On utilise l'access logging à la place — sécurité équivalente
  - CKV_AWS_76

  # API Gateway caching : optionnel, coût supplémentaire non justifié pour le Free Tier
  - CKV_AWS_120

  # DynamoDB PITR désactivé en dev intentionnellement (activé en prod via variable)
  - CKV_AWS_28

  # CloudWatch KMS custom : coûte $1/mois — on utilise AES256 géré par AWS (gratuit)
  - CKV_AWS_158

  # Lambda X-Ray : PassThrough intentionnel — X-Ray Active coûte ~$5/million de traces
  - CKV_AWS_50

  # SNS : pas de KMS custom pour les notifications (Free Tier)
  - CKV_AWS_26
