# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  WORKFLOW : pr-checks.yml                                                   │
# │                                                                             │
# │  Déclenché sur : toute Pull Request vers main ou develop                   │
# │                                                                             │
# │  Étapes (dans l'ordre) :                                                   │
# │    1. fmt       → vérifie le formatage Terraform (terraform fmt -check)    │
# │    2. validate  → vérifie la syntaxe HCL (terraform validate)              │
# │    3. tflint    → lint Terraform (bonnes pratiques, conventions AWS)        │
# │    4. checkov   → scan sécurité statique (IAM, chiffrement, etc.)          │
# │    5. plan      → affiche les changements prévus (dev uniquement)          │
# │                                                                             │
# │  SECRETS GitHub requis :                                                   │
# │    AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION                    │
# │    (Settings → Secrets and variables → Actions)                            │
# └─────────────────────────────────────────────────────────────────────────────┘

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.tf"
      - "lambda_src/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.7.4"
  TFLINT_VERSION: "v0.50.3"
  WORKING_DIR: "environments/dev"

jobs:
  # ─── Job 1 : fmt + validate ──────────────────────────────────────────────────
  terraform-fmt-validate:
    name: "fmt & validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # terraform fmt -check : échoue si un fichier n'est pas formaté
      # La convention Terraform impose un formatage standard (2 espaces, etc.)
      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff
        working-directory: .

      # terraform validate : vérifie la syntaxe HCL et les références
      # Ne contacte pas AWS — analyse statique uniquement
      - name: Terraform init (pour validate)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  # ─── Job 2 : TFLint ──────────────────────────────────────────────────────────
  tflint:
    name: "tflint"
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      # Init : télécharge le plugin AWS pour TFLint
      - name: TFLint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Lint récursif sur tout le projet
      - name: Run TFLint
        run: tflint --recursive --format compact

  # ─── Job 3 : Checkov ─────────────────────────────────────────────────────────
  checkov:
    name: "checkov security scan"
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Checkov analyse le code Terraform statiquement à la recherche de :
      # - Ressources sans chiffrement
      # - Policies IAM trop larges
      # - Logs désactivés
      # - Etc. (+ de 1000 règles)
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          config_file: .checkov.yaml
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      # Upload des résultats dans GitHub Security tab
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ─── Job 4 : Plan (dev) ───────────────────────────────────────────────────────
  terraform-plan-dev:
    name: "terraform plan (dev)"
    runs-on: ubuntu-latest
    needs: [tflint, checkov]

    # Permissions pour commenter la PR avec le plan
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Terraform init
        id: init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true  # On veut toujours commenter la PR même si plan échoue

      # Commente automatiquement la PR avec le résultat du plan
      # Le dev peut voir les changements sans quitter GitHub
      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Plan — dev

            #### Init \`${{ steps.init.outcome }}\`
            #### Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # Fail le job si le plan a échoué
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
