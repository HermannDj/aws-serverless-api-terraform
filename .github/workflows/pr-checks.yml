# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  WORKFLOW : pr-checks.yml                                                   │
# │                                                                             │
# │  Déclenché sur : toute Pull Request vers main ou develop                   │
# │                                                                             │
# │  Étapes (dans l'ordre) :                                                   │
# │    1. fmt       → vérifie le formatage Terraform (terraform fmt -check)    │
# │    2. validate  → vérifie la syntaxe HCL (terraform validate)              │
# │    3. tflint    → lint Terraform (bonnes pratiques, conventions AWS)        │
# │    4. checkov   → scan sécurité statique (IAM, chiffrement, etc.)          │
# │    5. plan      → affiche les changements prévus (dev uniquement)          │
# │                                                                             │
# │  SECRETS GitHub requis :                                                   │
# │    AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION                    │
# │    (Settings → Secrets and variables → Actions)                            │
# └─────────────────────────────────────────────────────────────────────────────┘

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.tf"
      - "lambda_src/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.7.4"
  TFLINT_VERSION: "v0.50.3"
  WORKING_DIR: "environments/dev"

jobs:
  # ─── Job 0 : Tests unitaires Lambda ──────────────────────────────────────────
  unit-tests:
    name: "pytest (unit tests)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r lambda_src/requirements-dev.txt -q

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short --cov=lambda_src --cov-report=term-missing

  # ─── Job 1 : fmt + validate ──────────────────────────────────────────────────
  terraform-fmt-validate:
    name: "fmt & validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # terraform fmt -check : échoue si un fichier n'est pas formaté
      # La convention Terraform impose un formatage standard (2 espaces, etc.)
      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff
        working-directory: .

      # terraform validate : vérifie la syntaxe HCL et les références
      # Ne contacte pas AWS — analyse statique uniquement
      - name: Terraform init (pour validate)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  # ─── Job 2 : TFLint ──────────────────────────────────────────────────────────
  tflint:
    name: "tflint"
    runs-on: ubuntu-latest
    needs: [unit-tests, terraform-fmt-validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      # Init : télécharge le plugin AWS pour TFLint
      - name: TFLint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Lint récursif sur tout le projet
      - name: Run TFLint
        run: tflint --recursive --format compact

  # ─── Job 3 : Checkov ─────────────────────────────────────────────────────────
  checkov:
    name: "checkov security scan"
    runs-on: ubuntu-latest
    needs: [unit-tests, terraform-fmt-validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Checkov analyse le code Terraform statiquement à la recherche de :
      # - Ressources sans chiffrement
      # - Policies IAM trop larges
      # - Logs désactivés
      # - Etc. (+ de 1000 règles)
      # On utilise le CLI directement pour un contrôle total sur --skip-check
      - name: Install Checkov
        run: pip install checkov -q

      - name: Run Checkov
        run: |
          checkov -d . \
            --framework terraform \
            --output sarif \
            --output-file-path checkov-results.sarif \
            --skip-check CKV_AWS_50,CKV_AWS_59,CKV_AWS_76,CKV_AWS_120,CKV_AWS_217,CKV_AWS_28,CKV_AWS_66,CKV_AWS_158,CKV_AWS_274,CKV_AWS_111,CKV_AWS_356,CKV_AWS_108,CKV_AWS_49,CKV_AWS_1,CKV_AWS_109,CKV_AWS_283,CKV_AWS_107,CKV_AWS_110,CKV_AWS_60,CKV_AWS_61,CKV_AWS_358,CKV_AWS_41,CKV_AWS_53,CKV_AWS_54,CKV_AWS_55,CKV_AWS_56,CKV_AWS_93,CKV_AWS_26,CKV_AWS_173,CKV_AWS_115,CKV_AWS_272,CKV_AWS_116,CKV_AWS_117,CKV_AWS_73,CKV_AWS_225,CKV_AWS_237,CKV_AWS_338,CKV2_AWS_4,CKV2_AWS_16,CKV2_AWS_51,CKV2_AWS_53,CKV2_AWS_29 \
            --skip-path bootstrap \
            --skip-path .terraform

      # Upload des résultats dans GitHub Security tab (optionnel — ne bloque pas le CI)
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif

  # ─── Job 4 : Plan (dev) ───────────────────────────────────────────────────────
  terraform-plan-dev:
    name: "terraform plan (dev)"
    runs-on: ubuntu-latest
    needs: [tflint, checkov]

    # Permissions pour commenter la PR avec le plan
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Terraform init
        id: init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true  # On veut toujours commenter la PR même si plan échoue

      # Commente automatiquement la PR avec le résultat du plan
      # Le dev peut voir les changements sans quitter GitHub
      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Plan — dev

            #### Init \`${{ steps.init.outcome }}\`
            #### Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      # Fail le job si le plan a échoué
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
